{% extends "base.html" %}

{% block title %}Register Teacher{% endblock %}

{% block content %}
<h2 class="page-title">Register Teacher</h2>

<div class="card p-4">
    <form method="POST" action="{{ url_for('register_teacher') }}">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <input type="text" name="full_name" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Phone</label>
                <input type="text" name="phone" class="form-control">
            </div>

            <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control">
            </div>

            <div class="col-md-6">
                <label class="form-label">Subjects</label>
                <input type="text" name="subjects" class="form-control" placeholder="Example: Mathematics, English">
            </div>

            <div class="col-md-6">
                <label class="form-label">Class Teacher For</label>
                <select name="class_teacher_for" class="form-select">
                    <option value="">Select Class</option>
                    {% for c in classes %}
                    <option value="{{ c.class_name }}">{{ c.class_name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-primary">Save Teacher</button>
            <a href="{{ url_for('teachers') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
