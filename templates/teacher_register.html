{% extends "base.html" %}
{% block title %}Teacher Registration{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Teacher Registration</h1>
    <p>Add a new teacher to the system.</p>
</div>

<div class="card-box">
    <form method="POST" class="form-grid">

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="full_name" required>
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email">
        </div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Register Teacher</button>
            <a href="{{ url_for('teachers') }}" class="btn-secondary">Back</a>
        </div>

    </form>
</div>

<style>
.page-header {
    margin-bottom: 24px;
}

.page-header h1 {
    margin: 0;
    color: #2563eb;
    font-size: 30px;
}

.page-header p {
    margin-top: 8px;
    color: #6b7280;
    font-size: 15px;
}

.card-box {
    background: white;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    max-width: 800px;
}

.form-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 18px;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.form-group label {
    margin-bottom: 6px;
    font-weight: 600;
    color: #1f2937;
}

.form-group input {
    padding: 12px;
    border: 1px solid #d1d5db;
    border-radius: 10px;
    font-size: 15px;
}

.form-group input:focus {
    outline: none;
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
}

.form-actions {
    grid-column: span 2;
    display: flex;
    gap: 12px;
    margin-top: 10px;
}

.btn-primary {
    background: #2563eb;
    color: white;
    border: none;
    padding: 12px 18px;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
}

.btn-primary:hover {
    background: #1e40af;
}

.btn-secondary {
    background: #e5e7eb;
    color: #111827;
    text-decoration: none;
    padding: 12px 18px;
    border-radius: 10px;
    font-weight: 600;
}

.btn-secondary:hover {
    background: #d1d5db;
}

@media (max-width: 700px) {
    .form-grid {
        grid-template-columns: 1fr;
    }

    .form-actions {
        grid-column: span 1;
        flex-direction: column;
    }
}
</style>
{% endblock %}
