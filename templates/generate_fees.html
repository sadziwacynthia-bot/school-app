{% extends "base.html" %}

{% block title %}Generate Fees{% endblock %}
{% block page_title %}Generate New Academic Year Fees{% endblock %}

{% block content %}
<div class="content-card">
    <form method="POST" action="/generate_fees">
        <div class="grid mb-20">
            <div>
                <label>Select Class</label>
                <select name="class_name" required>
                    <option value="">Choose class</option>
                    {% for class_item in classes %}
                        <option value="{{ class_item.class_name }}">{{ class_item.class_name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label>Academic Year</label>
                <input type="text" name="academic_year" placeholder="Example: 2027" required>
            </div>
        </div>

        <div class="grid mb-20">
            <div>
                <label>Term 1 Fee</label>
                <input type="number" step="0.01" name="term1_fee" required>
            </div>

            <div>
                <label>Term 2 Fee</label>
                <input type="number" step="0.01" name="term2_fee" required>
            </div>

            <div>
                <label>Term 3 Fee</label>
                <input type="number" step="0.01" name="term3_fee" required>
            </div>
        </div>

        <button type="submit" class="btn">Generate Fees</button>
    </form>
</div>
{% endblock %}
