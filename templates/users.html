{% extends "base.html" %}
{% block title %}Users{% endblock %}
{% block content %}
<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; gap:12px; flex-wrap:wrap;">
    <div>
        <h1 class="page-title">Users</h1>
        <p class="page-subtitle">All system users.</p>
    </div>
    <a href="{{ url_for('add_user') }}" class="btn">Add User</a>
</div>

<div class="card">
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Full Name</th>
                    <th>Username</th>
                    <th>Role</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user.full_name }}</td>
                    <td>{{ user.username }}</td>
                    <td>{{ user.role }}</td>
                    <td>
    <form method="POST" action="{{ url_for('delete_user', id=user.id) }}" onsubmit="return confirm('Are you sure you want to delete this user?');">
        <button type="submit" class="delete-btn">Delete</button>
    </form>
</td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="3">No users found.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
<style>
.delete-btn {
    background: #dc2626;
    color: white;
    border: none;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
}

.delete-btn:hover {
    background: #b91c1c;
}
</style>
{% endblock %}
