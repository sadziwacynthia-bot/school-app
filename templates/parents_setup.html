{% extends "base.html" %}
{% block title %}Parent Account Setup{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 30px auto;">
    <h1 class="page-title">Parent Account Setup</h1>
    <p class="page-subtitle">Use your child’s student number and your phone number to create your password.</p>

    <form method="POST">
        <div class="form-group">
            <label for="student_number">Student Number</label>
            <input type="text" id="student_number" name="student_number" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="phone">Guardian Phone Number</label>
            <input type="text" id="phone" name="phone" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="password">Create Password</label>
            <input type="password" id="password" name="password" class="form-control" required>
        </div>

        <button type="submit" class="btn" style="width: 100%;">Set Up Account</button>
    </form>
</div>
{% endblock %}
