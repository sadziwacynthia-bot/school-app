{% extends "base.html" %}
{% block title %}Edit Student{% endblock %}
{% block content %}
<div class="card">
    <h1 class="page-title">Edit Student</h1>

    <form method="GET">
        <div class="grid-2">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" class="form-control" value="{{ student.first_name }}" readonly>
            </div>

            <div class="form-group">
                <label>Last Name</label>
                <input type="text" class="form-control" value="{{ student.last_name }}" readonly>
            </div>

            <div class="form-group">
                <label>Class</label>
                <select class="form-control">
                    {% for class_name in class_options %}
                    <option value="{{ class_name }}" {% if student.class_name == class_name %}selected{% endif %}>{{ class_name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Student Type</label>
                <select class="form-control">
                    <option {% if student.boarding_status == 'Day' %}selected{% endif %}>Day</option>
                    <option {% if student.boarding_status == 'Boarder' %}selected{% endif %}>Boarder</option>
                </select>
            </div>
        </div>

        <a href="{{ url_for('students') }}" class="btn">Back to Students</a>
    </form>
</div>
{% endblock %}
