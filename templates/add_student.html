{% extends "base.html" %}

{% block title %}Register Student{% endblock %}

{% block content %}
<h2 class="page-title">Register Student</h2>

<div class="card p-4">
    <form method="POST" action="{{ url_for('save_student') }}">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">First Name</label>
                <input type="text" name="first_name" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Last Name</label>
                <input type="text" name="last_name" class="form-control" required>
            </div>

            <div class="col-md-4">
                <label class="form-label">Birthday</label>
                <input type="date" name="birthday" class="form-control">
            </div>

            <div class="col-md-4">
                <label class="form-label">Gender</label>
                <select name="gender" class="form-select">
                    <option value="">Select Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                </select>
            </div>

            <div class="col-md-4">
                <label class="form-label">Enrollment Date</label>
                <input type="date" name="enrollment_date" class="form-control">
            </div>

            <div class="col-md-4">
                <label class="form-label">Leaving Year</label>
                <input type="text" name="leaving_year" class="form-control">
            </div>

            <div class="col-md-4">
                <label class="form-label">Class</label>
                <select name="class_name" class="form-select">
                    <option value="">Select Class</option>
                    {% for c in classes %}
                    <option value="{{ c.class_name }}">{{ c.class_name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-4">
                <label class="form-label">Student Phone</label>
                <input type="text" name="student_phone" class="form-control">
            </div>

            <div class="col-md-6">
                <label class="form-label">Home Address</label>
                <input type="text" name="home_address" class="form-control">
            </div>

            <div class="col-md-6">
                <label class="form-label">Mailing Address</label>
                <input type="text" name="mailing_address" class="form-control">
            </div>

            <div class="col-md-6">
                <label class="form-label">Medical Info</label>
                <textarea name="medical_info" class="form-control" rows="3"></textarea>
            </div>

            <div class="col-md-6">
                <label class="form-label">Emergency Contact</label>
                <input type="text" name="emergency_contact" class="form-control">
            </div>
        </div>

        <hr class="my-4">

        <h4 class="text-primary">Guardian 1</h4>
        <div class="row g-3 mb-4">
            <div class="col-md-6">
                <label class="form-label">Name</label>
                <input type="text" name="guardian1_name" class="form-control">
            </div>
            <div class="col-md-6">
                <label class="form-label">Relationship</label>
                <input type="text" name="guardian1_relationship" class="form-control">
            </div>
            <div class="col-md-4">
                <label class="form-label">Phone</label>
                <input type="text" name="guardian1_phone" class="form-control">
            </div>
            <div class="col-md-4">
                <label class="form-label">WhatsApp</label>
                <input type="text" name="guardian1_whatsapp" class="form-control">
            </div>
            <div class="col-md-4">
                <label class="form-label">Email</label>
                <input type="email" name="guardian1_email" class="form-control">
            </div>
        </div>

        <h4 class="text-primary">Guardian 2</h4>
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Name</label>
                <input type="text" name="guardian2_name" class="form-control">
            </div>
            <div class="col-md-6">
                <label class="form-label">Relationship</label>
                <input type="text" name="guardian2_relationship" class="form-control">
            </div>
            <div class="col-md-4">
                <label class="form-label">Phone</label>
                <input type="text" name="guardian2_phone" class="form-control">
            </div>
            <div class="col-md-4">
                <label class="form-label">WhatsApp</label>
                <input type="text" name="guardian2_whatsapp" class="form-control">
            </div>
            <div class="col-md-4">
                <label class="form-label">Email</label>
                <input type="email" name="guardian2_email" class="form-control">
            </div>
        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-primary">Save Student</button>
            <a href="{{ url_for('students') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
