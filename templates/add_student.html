{% extends "base.html" %}
{% block title %}Register Student{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Register Student</h1>
    <p>Add a new student with guardians and fees.</p>
</div>

<form method="POST" action="{{ url_for('save_student') }}" class="student-form">

    <!-- STUDENT -->
    <div class="form-section">
        <h2>Student Information</h2>

        <div class="form-grid">
            <input type="text" name="first_name" placeholder="First Name" required>
            <input type="text" name="last_name" placeholder="Last Name" required>

            <input type="date" name="birthday">

            <select name="gender">
                <option value="">Gender</option>
                <option>Male</option>
                <option>Female</option>
            </select>

            <select name="class_name" required>
                <option value="">Select Class</option>
                {% for class_name in class_options %}
                    <option value="{{ class_name }}">{{ class_name }}</option>
                {% endfor %}
            </select>

            <select name="boarding_status">
                <option value="">Boarding</option>
                <option value="Day">Day</option>
                <option value="Boarder">Boarder</option>
            </select>

            <input type="date" name="enrollment_date">
            <input type="text" name="leaving_year" placeholder="Leaving Year">
        </div>
    </div>

    <!-- GUARDIAN -->
    <div class="form-section">
        <h2>Guardian 1</h2>

        <div class="form-grid">
            <input type="text" name="guardian1_name" placeholder="Full Name" required>
            <input type="text" name="guardian1_phone" placeholder="Phone" required>
            <input type="text" name="guardian1_relationship" placeholder="Relationship">
        </div>
    </div>

    <!-- OPTIONAL GUARDIAN 2 -->
    <div class="form-section">
        <h2>Guardian 2 (Optional)</h2>

        <div class="form-grid">
            <input type="text" name="guardian2_name" placeholder="Full Name">
            <input type="text" name="guardian2_phone" placeholder="Phone">
        </div>
    </div>

    <!-- FEES (SAFE VERSION) -->
    <div class="form-section">
        <h2>Fee Setup (Optional)</h2>

        <div class="form-grid">
            <input type="number" step="0.01" name="amount" placeholder="Total Fee">
            <input type="number" step="0.01" name="paid_amount" placeholder="Amount Paid">
            <input type="date" name="due_date">
        </div>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn">Register Student</button>
        <a href="{{ url_for('students') }}" class="btn-secondary">Cancel</a>
    </div>

</form>
{% endblock %}
