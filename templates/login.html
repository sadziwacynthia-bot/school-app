<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #dbeafe, #eef2ff);
            margin: 0;
            padding: 40px;
        }

        .login-box{
            max-width: 420px;
            margin: 80px auto;
            background: white;
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        h2{
            text-align: center;
            color: #1e3a8a;
            margin-bottom: 25px;
        }

        label{
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            color: #374151;
        }

        input{
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            margin-bottom: 18px;
            box-sizing: border-box;
        }

        button{
            width: 100%;
            background: #2563eb;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover{
            background: #1d4ed8;
        }

        .alert{
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            background: #dcfce7;
            color: #166534;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>School System Login</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" action="/login">
        <label>Username</label>
        <input type="text" name="username" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
