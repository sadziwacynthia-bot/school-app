{% extends "base.html" %}

{% block title %}Add Assignment{% endblock %}
{% block page_title %}Add Assignment{% endblock %}

{% block content %}

<div class="content-card">
    <form method="POST" action="/add_assignment">
        <div class="grid mb-20">
            <div>
                <label>Class</label>
                <select name="class_name" required>
                    <option value="">Choose class</option>
                    {% for item in subject_options %}
                    <option value="{{ item.class_name }}">{{ item.class_name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label>Subject</label>
                <select name="subject_name" required>
                    <option value="">Choose subject</option>
                    {% for item in subject_options %}
                    <option value="{{ item.subject_name }}">{{ item.subject_name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label>Due Date</label>
                <input type="date" name="due_date" required>
            </div>
        </div>

        <div class="mb-20">
            <label>Assignment Title</label>
            <input type="text" name="title" required>
        </div>

        <div class="mb-20">
            <label>Instructions</label>
            <textarea name="instructions" rows="6" required></textarea>
        </div>

        <button type="submit" class="btn">Create Assignment</button>
    </form>
</div>

{% endblock %}
