{% extends "base.html" %}
{% block title %}Add Assignment{% endblock %}
{% block content %}
<div class="card">
    <h1 class="page-title">Add Assignment</h1>

    <div class="grid-2">
        <div class="form-group">
            <label>Title</label>
            <input type="text" class="form-control">
        </div>

        <div class="form-group">
            <label>Class</label>
            <input type="text" class="form-control">
        </div>

        <div class="form-group">
            <label>Subject</label>
            <input type="text" class="form-control">
        </div>

        <div class="form-group">
            <label>Due Date</label>
            <input type="date" class="form-control">
        </div>
    </div>

    <button class="btn">Save Assignment</button>
</div>
{% endblock %}
