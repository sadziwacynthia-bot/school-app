{% extends "base.html" %}
{% block title %}Classes{% endblock %}
{% block content %}
<h1 class="page-title">Classes</h1>
<p class="page-subtitle">Choose a class to view its students.</p>

<div class="class-grid">
    {% for class_name in class_options %}
    <a href="{{ url_for('class_students', class_name=class_name) }}" class="class-card">
        {{ class_name }}
    </a>
    {% endfor %}
</div>
{% endblock %}
