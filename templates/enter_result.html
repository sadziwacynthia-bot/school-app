{% extends "base.html" %}
{% block title %}Enter Results{% endblock %}
{% block content %}
<div class="card">
    <h1 class="page-title">Enter Results</h1>
    <p class="page-subtitle">Choose class and enter student results.</p>

    <div class="grid-2">
        <div class="form-group">
            <label>Class</label>
            <select class="form-control">
                <option value="">Select Class</option>
                {% for class_name in class_options %}
                <option value="{{ class_name }}">{{ class_name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Subject</label>
            <input type="text" class="form-control" placeholder="Enter subject">
        </div>
    </div>

    <button class="btn">Open Result Entry</button>
</div>
{% endblock %}
